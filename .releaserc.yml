branches:
  - main
  - master

plugins:
  - "@semantic-release/commit-analyzer"
  - "@semantic-release/release-notes-generator"
  - ["@semantic-release/changelog", { changelogFile: "CHANGELOG.md" }]
  - ["@semantic-release/exec", { prepareCmd: "zip -ry simply-${nextRelease.version}.zip . -x '*.git*' -x 'node_modules*' -x 'src*' -x '*.md' -x '.*' -x '!package.json' -x '!package-lock.json'" }]
  - ["@semantic-release/git", { assets: ["CHANGELOG.md", "package.json", "simply-*.zip"], message: "chore(release): ${nextRelease.version} [skip ci]" }]
  - - "@semantic-release/github"
    - assets: [{ path: "simply-*.zip", label: "Simply Theme v${nextRelease.version}" }]
      successComment: false
      failComment: false
      assignees: []
      releasedLabels: []

releaseRules:
  - type: "docs"
    release: "patch"
  - type: "chore"
    release: "patch"
  - type: "style"
    release: "patch"
  - type: "refactor"
    release: "patch"
  - type: "test"
    release: "patch"
  - type: "build"
    release: "patch"
  - type: "ci"
    release: "patch"