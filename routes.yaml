routes:
  # LLM-friendly content endpoints
  /llms.txt:
    template: llms
    content_type: text/plain

  /llms-full.txt:
    template: llms-full
    content_type: text/plain

  /signup/: members/signup
  /signin/: members/signin
  /account/: members/account
  /membership/: members/membership

  /featured/:
    controller: channel
    filter: "tag:-[hash-portfolio,hash-kusi-doc]"
    limit: 12
    template: godo-template-featured
    data: page.featured

  /archive/:
    controller: channel
    filter: "tag:-[hash-portfolio,hash-kusi-doc]"
    limit: all
    template: godo-archive
    data: page.archive

  /grid/:
    controller: channel
    filter: "tag:-[hash-portfolio,hash-kusi-doc]"
    limit: 12
    template: godo-template-grid
    data: page.grid

  /sidebar/:
    controller: channel
    filter: "tag:-[hash-portfolio,hash-kusi-doc]"
    limit: 12
    template: godo-template-sidebar
    data: page.sidebar

  /medium/:
    controller: channel
    filter: "tag:-[hash-portfolio,hash-kusi-doc]"
    template: godo-template-medium
    limit: 14
    data: page.medium

  /featured-slider/:
    controller: channel
    filter: "tag:-[hash-portfolio,hash-kusi-doc]"
    template: godo-template-featured-slider
    data: page.featured-slider

  /photographer/:
    controller: channel
    filter: "tag:-[hash-portfolio,hash-kusi-doc]"
    template: godo-template-photographer
    limit: 12
    data: page.photographer

  /personal/:
    template: godo-home-personal
    data: page.godo-personal

  /medium-sidebar/:
    controller: channel
    template: godo-template-medium-sidebar
    data:
      post: page.medium-with-sidebar
    limit: 14

  /podcast/rss/:
    template: podcast/rss
    content_type: text/xml

collections:
  # PortFolio
  /portfolio/:
    permalink: /portfolio/{slug}/
    filter: "tag:[hash-portfolio]"
    data: page.portfolio
    template: godo-template-portfolio
    limit: all

  # Podcast
  /podcast/:
    permalink: /podcast/{slug}/
    filter: "tag:[hash-podcast]"
    data: page.podcast
    template: godo-podcast
    limit: 10

  # Documentation
  /docs/:
    permalink: /docs/{slug}/
    filter: "tag:[hash-kusi-doc]"
    template: godo-home-kusi-doc

  # Default
  /:
    permalink: /{slug}/
    filter: "tag:-[hash-portfolio,hash-kusi-doc,hash-podcast]"
    template: index

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/
